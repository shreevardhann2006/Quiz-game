<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instrumentation Quiz - Multiplayer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
    <!-- Confetti JS -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- Supabase SDK for Realtime Multiplayer -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <div class="container" id="main-container">
        
        <!-- =================== ROLE SELECTION =================== -->
        <div id="role-screen" class="screen active bounce-in">
            <div class="icon-wrapper"><span class="icon">🚀</span></div>
            <h1>Multiplayer Quiz Game</h1>
            <p>Play with friends in real-time!</p>
            <div class="role-buttons">
                <button id="btn-host-role" class="bouncy-btn primary-btn">HOST A GAME</button>
                <button id="btn-join-role" class="bouncy-btn secondary-btn">JOIN A GAME</button>
            </div>
        </div>

        <!-- =================== HOST SCREENS =================== -->
        <!-- Host Lobby -->
        <div id="host-lobby-screen" class="screen hidden">
            <h1>Game Lobby</h1>
            <div class="pin-display">Game PIN: <span id="host-pin">...</span></div>
            <p>Waiting for players to join...</p>
            <div id="players-list" class="players-grid"></div>
            <button id="btn-start-game" class="bouncy-btn primary-btn" disabled>START GAME</button>
        </div>

        <!-- Host Quiz Screen (Shows Question) -->
        <div id="host-quiz-screen" class="screen hidden">
            <div class="hud" style="flex-direction: column; gap: 10px;">
                <div style="display: flex; justify-content: space-between; width: 100%;">
                    <div class="question-count">Q: <span id="host-q-count">1</span>/20</div>
                    <div class="timer-text" style="font-size: 24px; font-weight: 900;">⏱ <span id="host-timer">20</span>s</div>
                </div>
                <div class="timer-bar-bg" style="width: 100%; height: 15px; background: #eee; border-radius: 10px; overflow: hidden;"><div id="timer-bar-fill" class="timer-bar-fill" style="width: 100%; height: 100%; background: var(--secondary-color); border-radius: 10px; transition: width 1s linear, background 0.3s;"></div></div>
            </div>
            
            <div class="question-container">
                <h2 id="host-question-text">Question goes here?</h2>
                <img id="host-question-image" src="" alt="Question Image" class="hidden-img pop-in">
            </div>
            
            <div id="host-choices" class="choices">
                <!-- Host sees the choices but cannot click them -->
            </div>
            <div class="answers-received">Answers: <span id="host-answers-count">0</span>/<span id="host-total-players">0</span></div>
        </div>

        <!-- Host Leaderboard Screen -->
        <div id="host-leaderboard-screen" class="screen hidden">
            <h1>Leaderboard</h1>
            <div id="leaderboard-list" class="leaderboard-list"></div>
            <button id="btn-next-question" class="bouncy-btn primary-btn mt-20" style="display: none;">NEXT QUESTION</button>
        </div>

        <!-- =================== PLAYER SCREENS =================== -->
        <!-- Player Join Screen -->
        <div id="player-join-screen" class="screen hidden">
            <h1>Join Game</h1>
            <input type="text" id="input-pin" class="cool-input" placeholder="Enter Game PIN" maxlength="4">
            <input type="text" id="input-name" class="cool-input" placeholder="Enter Nickname" maxlength="12">
            <button id="btn-join-game" class="bouncy-btn secondary-btn">JOIN</button>
            <p id="join-error" class="error-text"></p>
        </div>

        <!-- Player Waiting Screen -->
        <div id="player-waiting-screen" class="screen hidden">
            <div class="icon-wrapper pulse"><span class="icon">⏳</span></div>
            <h2 id="player-waiting-text">You're in!</h2>
            <p>See your nickname on the screen.</p>
        </div>

        <!-- Player Answer Screen (4 big buttons) -->
        <div id="player-answer-screen" class="screen hidden">
            <div class="hud">
                <div class="score-display">⭐ <span id="player-score">0</span></div>
            </div>
            <div class="player-choices">
                <button class="player-btn candy-btn-0" data-idx="0">A</button>
                <button class="player-btn candy-btn-1" data-idx="1">B</button>
                <button class="player-btn candy-btn-2" data-idx="2">C</button>
                <button class="player-btn candy-btn-3" data-idx="3">D</button>
            </div>
        </div>

        <!-- Player Feedback Screen -->
        <div id="player-feedback-screen" class="screen hidden">
            <img id="player-feedback-image" src="" alt="Feedback Animation" class="feedback-anim">
            <h1 id="player-feedback-text">Awesome!</h1>
            <div class="points-awarded"><span id="player-points">0</span></div>
            <p>Current Score: <span id="player-score-total">0</span></p>
        </div>

        <!-- End Result Screen (Host and Player) -->
        <div id="result-screen" class="screen hidden">
            <div class="icon-wrapper"><span class="icon">🏆</span></div>
            <h1>GAME OVER</h1>
            <div id="final-winner-display"></div>
            <button id="btn-home" class="bouncy-btn secondary-btn mt-20">HOME MENU</button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
